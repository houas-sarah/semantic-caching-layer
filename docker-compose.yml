services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
    env_file:
      - .env
    volumes:
      - ./data:/app/data   # persistance de l'index FAISS entre les runs
    depends_on:
      - redis

volumes:
  redis-data:
